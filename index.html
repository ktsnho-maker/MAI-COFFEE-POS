  *{box-sizing:border-box; -webkit-tap-highlight-color:rgba(0,0,0,0); tap-highlight-color:rgba(0,0,0,0);}
  .ic{display:inline-flex; align-items:center; justify-content:center; line-height:0; flex-shrink:0;}

  html,body{margin:0;height:100%; -webkit-tap-highlight-color:rgba(0,0,0,0);}
  button,a,.menu-card-main,.option-choice,.tab,.fs-toggle-btn,.icon-btn,.iname-btn,.stepper button,

  body{

    background:
      radial-gradient(circle at top left, rgba(242,96,10,.20), transparent 32%),
      radial-gradient(circle at top right, rgba(43,22,8,.45), transparent 34%),
      linear-gradient(180deg, #46291a 0%, #7c4e2d 48%, #46291a 100%);
    color:var(--ink); height:100vh; overflow:hidden;
  }
  body.theme-matcha{
    --bg:#697452; --surface:#fbfaef; --ink:#26301d; --ink-soft:#626b4b;
    --border:#c8cba9; --emerald:#6f7a48; --emerald-dark:#4f5d34; --emerald-light:#eef2dd;
    --orange:#6f7a48; --orange-dark:#4f5d34; --orange-light:#9aaa68; --stone-800:#3f472d; --stone-900:#202b18;
    --red:#9b5a45; --cream:#e7e4c8; --cream-soft:#f2efd8; --latte:#aeb58d; --coffee:#4f5d34;
    --blue:#66794d; --blue-dark:#485a35;
    background:
      radial-gradient(circle at top left, rgba(154,170,104,.26), transparent 32%),
      radial-gradient(circle at top right, rgba(32,43,24,.42), transparent 34%),
      linear-gradient(180deg, #303821 0%, #6f7a48 50%, #303821 100%);

  body.theme-matcha .brand-name{color:#9aaa68;}
  body.theme-matcha .tab.active,
  body.theme-matcha .btn-checkout,
  body.theme-matcha .btn-primary,
  body.theme-matcha .btn-export,
  body.theme-matcha .backup-btn.primary,
  body.theme-matcha .cart-mobile-bar button{

  body.theme-matcha .menu-search{

  body.theme-matcha .menu-search:focus-within{

  body.theme-matcha .menu-section{

  }
  body.theme-matcha .menu-card:active .name{

  body.theme-matcha .qty-badge{

  }
  body.theme-matcha .count-pill{
    color:var(--orange);

  body.theme-matcha .option-choice.selected{

  body.theme-matcha .cart-summary-block,
  body.theme-matcha .restoring-banner,
  body.theme-matcha .report-hero,

  body.theme-matcha .panel,

  body.theme-matcha .order-reprint,

  body.theme-matcha .pm-tag.cash,
  body.theme-matcha .item-option-tag,

  #app{height:100%; display:flex; flex-direction:column;}
  button{font-family:inherit; cursor:pointer; border:none; background:none;}
  input,select{font-family:inherit;}
  .brand{font-family:Georgia,"Times New Roman",serif; font-style:italic; font-weight:600;}

  /* Header */
  .header{flex:0 0 auto; background:rgba(42,22,12,.96); color:#fffaf1; padding:10px 16px;
    display:flex; align-items:center; justify-content:space-between; gap:16px;
    box-shadow:0 1px 18px rgba(75,46,32,.22); border-bottom:1px solid rgba(244,233,214,.12);
    backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px); z-index:20;}
  .brand-row{display:flex; align-items:center; gap:10px;}
  .brand-logo{width:42px; height:42px; border-radius:50%; object-fit:cover; flex-shrink:0;
    box-shadow:0 0 0 2px rgba(244,233,214,.22), 0 4px 10px rgba(0,0,0,.35);}
  .brand-name{font-family:Arial,Helvetica,sans-serif; font-style:normal; font-size:18px; line-height:1.05; font-weight:900; letter-spacing:.11em; text-transform:uppercase; color:var(--orange);}
  .brand-tag{font-family:Georgia,"Times New Roman",serif; font-style:italic; font-size:12px; color:#f4e9d6; margin-top:2px; letter-spacing:.08em;}
  .header-left{display:flex; align-items:center; gap:14px; min-width:0;}
  .header-note{display:flex; flex-direction:column; gap:4px; min-width:0;}
  .tabs{display:flex; gap:4px; background:rgba(244,233,214,.10); border-radius:999px; padding:4px;
    box-shadow:inset 0 0 0 1px rgba(244,233,214,.10);}
  .tab{display:flex; align-items:center; gap:7px; padding:7px 12px; border-radius:999px;
    font-size:13px; font-weight:700; color:#d8bd9b; white-space:nowrap; transition:background .18s ease, color .18s ease, transform .14s ease;}
  .tab:hover{transform:translateY(-1px); background:rgba(244,233,214,.12);}
  .tab.active{background:var(--orange); color:#fffaf1; box-shadow:0 7px 18px rgba(242,96,10,.24);}
  .tab-icon{position:relative; width:20px; height:20px; flex:0 0 auto; display:inline-block;}
  .tab-icon-pos{display:flex; align-items:center; justify-content:center;}
  .tab-icon-pos svg{width:100%; height:100%;}
  .tab-icon-reports::before,.tab-icon-reports::after{content:""; position:absolute; bottom:3px; width:5px; border-radius:4px 4px 1px 1px; background:currentColor;}
  .tab-icon-reports::before{left:3px; height:9px; box-shadow:7px -5px 0 currentColor,14px -1px 0 currentColor;}
  .tab-icon-settings{display:flex; align-items:center; justify-content:center;}
  .tab-icon-settings svg{width:100%; height:100%;}
  .header-right{display:flex; align-items:center; gap:10px;}
  .fs-toggle-btn{width:34px; height:34px; border-radius:10px; display:flex; align-items:center; justify-content:center;
    color:#d8bd9b; background:rgba(244,233,214,.10); flex-shrink:0; transition:background .16s ease, color .16s ease, transform .14s ease;}
  .fs-toggle-btn:hover{background:rgba(244,233,214,.18); color:#fffaf1; transform:translateY(-1px);}
  .fs-toggle-btn:active{transform:scale(.92);}
  @media (max-width:480px){
    .tab span.tab-label{display:none;} .brand-tag{display:none;}
    .tab{padding:8px 9px;}
    .brand-logo{width:32px; height:32px;}
    .brand-name{font-size:14px; letter-spacing:.06em; white-space:nowrap;}
    .header-right{gap:6px;}
    .header{padding:8px 10px;}
  }

  /* Main layout */
  .main{flex:1; display:flex; overflow:hidden; min-height:0;}
  .pos-main{position:relative; flex:1; display:flex; flex-direction:column; overflow:hidden; min-height:0;}

  .cat-bar{flex:0 0 auto; display:flex; gap:8px; padding:14px 16px 8px; overflow-x:auto;}
  .cat-chip{flex-shrink:0; display:flex; align-items:center; gap:6px; padding:8px 14px;
    border-radius:999px; font-size:13px; font-weight:600; background:var(--surface);
    color:var(--ink-soft); border:1px solid var(--border); transition:transform .14s ease, background .16s ease, border-color .16s ease;}
  .cat-chip:hover{transform:translateY(-1px);}
  .cat-chip.active{background:var(--coffee); color:#fffaf1; border-color:var(--coffee);}

  .menu-shell{position:absolute; top:10px; left:16px; right:16px; z-index:16; display:flex; flex-direction:column; gap:10px; padding:0; pointer-events:none;}
  .menu-toolbar{display:flex; gap:10px; align-items:center; justify-content:center; flex-wrap:wrap; pointer-events:none;}
  .menu-search{width:100%; max-width:720px; flex:0 1 720px; min-width:220px; display:flex; align-items:center; gap:10px; background:rgba(255,250,241,.94);
    border:1.5px dashed var(--orange); border-radius:18px; padding:10px 14px; box-shadow:0 10px 26px rgba(242,96,10,.30), 0 0 0 3px rgba(242,96,10,.08); transition:transform .16s ease, box-shadow .16s ease, border-color .16s ease;}
  .menu-search{pointer-events:auto;}
  .menu-search:focus-within{transform:translateY(-1px); border-color:var(--orange); box-shadow:0 14px 30px rgba(242,96,10,.36), 0 0 0 3px rgba(242,96,10,.16);}
  .menu-search span{color:var(--ink-soft); font-size:15px;}
  .menu-search input{flex:1; min-width:0; border:none; outline:none; background:transparent; font-size:14px; color:var(--ink);}
  .menu-search input::placeholder{color:#9b7a5d;}
  .menu-search .clear-search{color:var(--ink-soft); font-size:18px; padding:0 2px;}
  .menu-meta{display:flex; gap:8px; flex-wrap:wrap;}
  .mini-pill{display:inline-flex; align-items:center; gap:6px; padding:8px 12px; border-radius:999px;
    background:rgba(255,250,241,.86); border:1px solid var(--border); font-size:12px; color:var(--ink-soft); font-weight:600;}
  .mini-pill strong{color:var(--ink);}
  .menu-scroll{flex:1; overflow-y:auto; padding:72px 16px 110px; overscroll-behavior:contain;}
  .menu-section{margin-bottom:9px; border:1px solid rgba(244,233,214,.24); border-radius:22px; padding:10px; background:rgba(42,22,12,.54); box-shadow:0 16px 34px rgba(42,22,12,.18);}
  .menu-section-head{width:100%; display:flex; align-items:center; justify-content:space-between; gap:10px; margin:0 0 10px; padding:6px 6px 8px; text-align:left; color:inherit; transition:transform .14s ease;}
  .menu-section-head:hover{transform:translateX(2px);}
  .menu-section-title{display:flex; align-items:center; gap:8px; font-size:13px; font-weight:900; text-transform:capitalize; color:#fff3df; opacity:1; text-shadow:0 1px 8px rgba(42,22,12,.45);}
  .menu-section-count{font-size:10px; font-weight:900; color:#fffaf1; background:rgba(242,96,10,.92); border:1px solid rgba(255,250,241,.36);
    padding:4px 9px; border-radius:999px; opacity:1; box-shadow:0 0 0 2px rgba(242,96,10,.16), 0 0 18px rgba(242,96,10,.62); backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);}
  .menu-section-actions{display:flex; align-items:center; gap:7px; flex-shrink:0;}
  .menu-section-body{overflow:visible; animation:expandIn .22s ease-out both; transform-origin:top;}
  .menu-section.collapsed .menu-section-body{display:none;}
  .menu-grid{display:grid; grid-template-columns:repeat(2,1fr); gap:12px;}
  @media (min-width:640px){ .menu-grid{grid-template-columns:repeat(3,1fr);} }
  @media (min-width:900px){ .menu-grid{grid-template-columns:repeat(4,1fr);} .menu-scroll{padding-bottom:24px;} }
  .menu-card{position:relative; z-index:1; text-align:left; background:linear-gradient(180deg,#fffaf1,#fff3df);
    border:1.5px solid rgba(242,96,10,.44); border-radius:20px; padding:0; overflow:hidden;
    box-shadow:0 12px 28px rgba(75,46,32,.08); touch-action:manipulation; will-change:transform;
    transition:transform .22s cubic-bezier(.34,1.56,.64,1), box-shadow .18s ease, border-color .16s ease, background .12s;
    min-height:104px; transform-origin:center center;}
  .menu-card:hover{position:relative; z-index:25; border-color:rgba(242,96,10,.46);
    box-shadow:0 18px 34px rgba(75,46,32,.15), 0 0 0 1px rgba(242,96,10,.08);
    animation:cardBubbleHover .3s cubic-bezier(.33,1.1,.5,1) both;}
  .menu-card:active, .menu-card.is-pressed{position:relative; z-index:26; border-color:rgba(242,96,10,.86);
    box-shadow:inset 0 0 0 1.5px rgba(242,96,10,.72), inset 0 0 18px 5px rgba(255,138,46,.32), inset 0 0 42px 10px rgba(242,96,10,.18), 0 12px 24px rgba(75,46,32,.16);
    animation:cardBubblePress .5s cubic-bezier(.22,1,.36,1) both;}
  .menu-card .name{font-weight:800; font-size:17px; line-height:1.26; padding-top:0; color:var(--ink); text-align:left; text-transform:uppercase;}
  .menu-card .price{margin-top:10px; display:flex; align-items:baseline; justify-content:flex-end; gap:5px;
    font-size:14px; letter-spacing:.01em; text-align:right;}
  .menu-card .price-amount{color:var(--emerald-dark); font-weight:800;}
  .menu-card .price-unit{color:#9b7a5d; font-size:11px; font-weight:600;}
  .card-stt-wm{position:absolute; z-index:0; right:-8px; bottom:-22px; pointer-events:none; user-select:none;
    font-size:88px; font-weight:900; line-height:1; font-family:inherit; letter-spacing:-3px;
    color:rgba(242,96,10,.22); text-shadow:1px 1px 0 rgba(255,255,255,.6), -1px -1px 1px rgba(154,64,4,.18);}
  .menu-card-main{width:100%; min-height:104px; padding:14px 14px 15px; text-align:left; position:relative;
    display:flex; flex-direction:column; align-items:stretch; justify-content:space-between;}
  .option-modal-card{max-width:430px;}
  .option-modal-head{display:flex; justify-content:space-between; align-items:flex-start; gap:14px; margin-bottom:14px;}
  .option-modal-head h3{margin:0; color:var(--stone-900); line-height:1.25;}
  .option-modal-price{font-size:13px; font-weight:800; color:var(--emerald-dark); white-space:nowrap; padding-top:2px;}
  .menu-card-options{border:1px solid var(--border); border-radius:18px; padding:14px; background:#fff6e8; animation:expandIn .18s ease-out both; transform-origin:top;}
  .option-group-block{margin-bottom:12px;}
  .option-group-block:last-of-type{margin-bottom:10px;}
  .option-group-title{display:flex; align-items:baseline; justify-content:space-between; gap:10px; margin-bottom:7px; font-size:12px; font-weight:800;}
  .option-group-label{display:flex; align-items:baseline; gap:7px; min-width:0;}
  .option-group-hint{color:var(--ink-soft); font-size:10px; font-weight:600;}
  .option-group-extra{margin-left:auto; white-space:nowrap; color:var(--emerald-dark); font-size:12px; font-weight:400;}
  .option-group-extra-unit{color:#9b7a5d; font-size:10px; font-weight:400;}
  .option-choice-row{display:flex; flex-wrap:wrap; gap:9px;}
  .option-choice{padding:9px 16px; border-radius:999px; border:2px solid var(--border); background:#fffaf1; color:var(--ink-soft);
    font-size:13px; font-weight:800; display:inline-flex; align-items:center; gap:6px;
    transition:transform .12s ease, background .14s ease, border-color .14s ease, box-shadow .14s ease, color .14s ease;}
  .option-choice:hover{transform:translateY(-1px); border-color:rgba(242,96,10,.6);}
  .option-choice.selected{background:var(--orange); border-color:var(--orange-dark); color:#fff;
    box-shadow:0 8px 18px rgba(242,96,10,.42); transform:translateY(-1px);
    text-shadow:0 0 5px rgba(242,96,10,.82), 0 0 14px rgba(255,138,46,.46);}
  .option-choice .check-dot{display:none; width:15px; height:15px; border-radius:50%; background:#fff; color:var(--orange-dark);
    font-size:10px; font-weight:900; align-items:center; justify-content:center; flex-shrink:0;}
  .option-choice.selected .check-dot{display:inline-flex;}
  .option-note-block{margin-top:4px; padding:13px 10px 10px; border-top:1px dashed rgba(199,154,107,.45); margin-bottom:13px;
    border-radius:14px; background:rgba(199,154,107,.12);}
  .option-note-input{width:100%; padding:9px 12px; font-size:13px;}
  .option-note-block .cart-note-row{border:1px solid rgba(209,173,131,.45); background:rgba(255,250,241,.38); padding:7px 8px; min-height:40px;}
  .option-note-block .cart-note-row .iname{color:var(--ink-soft);}
  .option-note-block .cart-note-row .iprice{color:#9b7a5d;}
  .option-note-block .cart-note-row .iprice.has-note{color:var(--orange); font-weight:700;}
  .option-note-block .cart-note-edit-row .edit-input{border-color:rgba(209,173,131,.72); background:#fffaf1; color:var(--ink);}
  .option-note-block .cart-note-edit-row .edit-input:focus{border-color:var(--orange); box-shadow:0 0 0 2px rgba(242,96,10,.14);}
  .option-note-block .cart-note-edit-row .icon-btn{background:rgba(122,78,43,.10); color:var(--orange-dark);}
  .option-note-block .note-clear-btn{color:#7A4E2B; background:#f4e9d6;}
  .option-note-block .note-chip{background:rgba(255,250,241,.72); color:var(--ink-soft); border:1px solid rgba(209,173,131,.72);}
  .option-note-block .note-chip:hover{background:var(--orange); color:#fff; border-color:var(--orange-dark); transform:translateY(-1px);}
  @media (hover:none){
    .option-note-block .note-chip:hover,
    .option-note-block .note-chip:active,
    .option-note-block .note-chip:focus{
      background:rgba(255,250,241,.72); color:var(--ink-soft); border-color:rgba(209,173,131,.72); transform:none; box-shadow:none;
    }
  }
  .option-add-row{display:flex; justify-content:space-between; align-items:center; gap:10px; padding-top:4px;}
  .option-current-price{font-size:13px; color:var(--ink-soft);}
  .option-current-price strong{color:var(--emerald-dark); font-size:16px;}
  .option-add-btn{width:38px; height:38px; border-radius:50%; background:var(--orange); color:#fff; font-size:23px; font-weight:500;
    display:flex; align-items:center; justify-content:center; box-shadow:0 8px 18px rgba(242,96,10,.28);}
  .option-add-btn:not(:disabled):active{animation:tapPop .22s ease-out both;}
  .option-add-btn:disabled{background:#d8bd9b; box-shadow:none; cursor:not-allowed;}
  .qty-badge{position:absolute; top:6px; right:6px; z-index:3; width:29px; height:29px; border-radius:50%;
    background:linear-gradient(135deg,#FF8A2E,#F2600A); color:#fff; font-size:14.5px; font-weight:900; display:flex;
    align-items:center; justify-content:center; box-shadow:0 0 0 2px rgba(255,250,241,.95), 0 0 18px rgba(255,138,46,.72), 0 8px 18px rgba(242,96,10,.36);}
  .menu-card:active .name{color:#fffaf1; text-shadow:0 0 5px rgba(242,96,10,.82), 0 0 14px rgba(255,138,46,.46), 0 0 24px rgba(242,96,10,.28); filter:drop-shadow(0 0 4px rgba(242,96,10,.34));}
  @keyframes badgeBounce{
    0%{ transform:scale(1); }
    30%{ transform:scale(1.38); }
    55%{ transform:scale(.88); }
    78%{ transform:scale(1.12); }
    100%{ transform:scale(1); }
  }
  .qty-badge.badge-bounce{ animation:badgeBounce .42s cubic-bezier(.34,1.56,.64,1); }
  .empty-note{grid-column:1/-1; text-align:center; color:#9b7a5d; font-size:13px; padding:48px 0;}

  /* Cart (desktop sidebar) */
  .cart-desktop{display:none; width:340px; flex-shrink:0; background:linear-gradient(180deg,#2a160c,#4B2E20); color:#fffaf1; flex-direction:column;}
  @media (min-width:768px){ .cart-desktop{display:flex;} }
  .cart-title{display:flex; align-items:center; gap:9px; padding:18px 18px 10px; font-weight:850; color:var(--orange-light);}
  .bag-icon{position:relative; width:18px; height:18px; flex:0 0 auto; display:inline-flex;}

  #cashInput{font-size:20px; font-weight:900; color:var(--emerald-dark);}
  #cashInput::-webkit-outer-spin-button,
  #cashInput::-webkit-inner-spin-button{-webkit-appearance:none; margin:0;}
  #cashInput[type=number]{-moz-appearance:textfield;}
  #cashInput:focus{border-color:var(--emerald); box-shadow:0 0 0 2px var(--emerald-light);}
  .cash-unit{position:absolute; right:76px; top:50%; transform:translateY(-50%); color:var(--emerald-dark); font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.08em; pointer-events:none;}
  .cash-stepper{position:absolute; right:38px; top:50%; transform:translateY(-50%); display:flex; flex-direction:column; gap:2px;}
  .cash-stepper button{width:28px; height:18px; border-radius:6px; background:#f4e9d6; color:#7A4E2B; font-size:11px; line-height:1; padding:0;}
  .cash-clear{position:absolute; right:6px; top:50%; transform:translateY(-50%); width:28px; height:28px; border-radius:8px; background:#f4e9d6; color:#7A4E2B; font-size:16px; line-height:1; padding:0;}
  .quick-cash{display:flex; gap:6px; flex-wrap:wrap; margin-bottom:14px;}
  .quick-cash button{font-size:12px; font-weight:600; background:#f4e9d6; color:#7A4E2B; padding:6px 10px; border-radius:10px; transition:transform .12s ease, background .14s ease;}
  .quick-cash button:hover{transform:translateY(-1px);}
  .quick-cash button.exact{background:var(--emerald-light); color:var(--emerald-dark);}
  .change-row{display:flex; justify-content:space-between; align-items:baseline; gap:10px; font-size:13px; padding:0 2px; margin-bottom:18px;}
  .change-row .muted{color:var(--orange); font-weight:900; text-transform:none; letter-spacing:0;}
  .change-row .v{display:flex; align-items:baseline; gap:8px; font-weight:800;}
  .change-row .amt{color:var(--orange); font-size:22px;}
  .change-row .amt.danger{color:var(--orange); font-size:22px; text-transform:uppercase;}
  .change-row .unit{color:var(--orange); font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:.08em;}
  .modal-actions{display:flex; gap:8px;}
  .confirm-card h3{color:var(--orange); font-weight:850;}
  .confirm-danger{background:var(--red);}
  .btn-secondary{flex:1; padding:12px; border-radius:12px; font-weight:600; font-size:13.5px; background:#f4e9d6; color:#7A4E2B; transition:transform .12s ease, background .14s ease;}
  .btn-primary{flex:1; padding:12px; border-radius:12px; font-weight:600; font-size:13.5px; background:var(--orange); color:#fff; transition:transform .12s ease, box-shadow .16s ease;}
  .btn-secondary:active,.btn-primary:not(:disabled):active{transform:scale(.98);}
  .btn-primary:not(:disabled):hover{box-shadow:0 10px 22px rgba(242,96,10,.22);}
  .btn-primary:disabled{background:#d8bd9b; color:#fff6e8; cursor:not-allowed;}
  .btn-print{flex:1; padding:12px; border-radius:12px; font-weight:700; font-size:13.5px;
    background:var(--cream-soft); color:var(--orange-dark); border:1.5px solid var(--orange);
    transition:transform .12s ease, box-shadow .16s ease, background .14s ease;}
  .btn-print:hover{background:#fff; box-shadow:0 8px 18px rgba(242,96,10,.18); transform:translateY(-1px);}
  .btn-print:active{transform:scale(.98);}

  .ticket{text-align:center;}
  .ticket .ok-circle{width:54px;height:54px;border-radius:50%;background:var(--emerald-dark);
    display:flex;align-items:center;justify-content:center;margin:0 auto 14px;font-size:24px;color:#fff;}
  .ticket .eyebrow{font-size:11px; text-transform:uppercase; letter-spacing:.08em; color:#9b7a5d; margin-bottom:4px;}
  .ticket .slogan{font-size:21px; margin-bottom:16px;}
  .ticket-items{border-top:1px dashed #d8bd9b; padding-top:14px; margin-bottom:10px; text-align:left;}
  .ticket-items .trow{display:flex; justify-content:space-between; font-size:13px; color:#7A4E2B; padding:2px 0;}
  .ticket-total{border-top:1px dashed #d8bd9b; padding-top:12px; display:flex; justify-content:space-between; font-weight:700; margin-bottom:4px;}
  .ticket-change{display:flex; justify-content:space-between; font-size:13px; color:#7A4E2B; margin-bottom:18px;}
  .btn-dark{width:100%; padding:12px; border-radius:12px; font-weight:600; font-size:13.5px; background:var(--orange-light); color:#fff;
    box-shadow:0 8px 20px rgba(242,96,10,.34); transition:transform .12s ease, box-shadow .16s ease, background .16s ease;}
  .btn-dark:hover{background:var(--orange); transform:translateY(-1px);}
  .btn-dark:active{transform:scale(.98);}

  .completion-overlay{position:fixed; inset:0; z-index:70; display:flex; align-items:center; justify-content:center; padding:16px;}
  .completion-overlay .modal-bg{z-index:0;}
  .completion-burst{position:relative; width:min(360px, calc(100vw - 32px)); padding:22px 20px; border-radius:26px;
    background:rgba(255,250,241,.94); border:1px solid rgba(226,205,179,.95); box-shadow:0 18px 50px rgba(75,46,32,.24);
    backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px); text-align:center; transform:translateY(10px) scale(.94); opacity:0;
    z-index:1; animation:completionPop .24s ease-out forwards;}
  .completion-icon{width:64px; height:64px; margin:0 auto 12px; border-radius:50%; background:linear-gradient(135deg,var(--orange-light),var(--orange));
    color:#fff; display:flex; align-items:center; justify-content:center; font-size:30px; box-shadow:0 12px 24px rgba(242,96,10,.32);}
  .completion-title{font-size:17px; font-weight:800; color:var(--stone-900); margin-bottom:4px;}
  .completion-sub{font-size:13px; color:var(--ink-soft);}
  .completion-code{margin-top:8px; font-size:12px; color:var(--ink-soft);}
  .completion-actions{display:flex; gap:8px; margin-top:16px;}
  .completion-actions button{flex:1;}
  @keyframes completionPop{
    0%{opacity:0; transform:translateY(16px) scale(.9);}
    100%{opacity:1; transform:translateY(0) scale(1);}
  }

  .toast{position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:var(--stone-900); color:#fffaf1;
    font-size:13px; padding:10px 18px; border-radius:999px; box-shadow:0 4px 14px rgba(75,46,32,.28); z-index:60; animation:toastIn .22s ease-out both;}

  .history-toolbar{display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; gap:10px;}
  .history-toolbar h3{margin:0; font-size:15px; font-weight:850; color:#fffaf1; text-shadow:0 1px 8px rgba(42,22,12,.45);}
  .btn-export{background:var(--orange); color:#fff; padding:9px 16px; border-radius:12px;
    font-weight:600; font-size:13px; display:inline-flex; align-items:center; gap:6px; flex-shrink:0; transition:transform .12s ease, box-shadow .16s ease;}
  .btn-export:hover{transform:translateY(-1px); box-shadow:0 10px 22px rgba(242,96,10,.22);}
  .range-chips{display:flex; gap:6px; overflow-x:auto; margin-bottom:10px; padding-bottom:2px;}
  .range-chip{flex-shrink:0; padding:7px 13px; border-radius:999px; font-size:12.5px; font-weight:600;
    background:var(--surface); border:1px solid var(--border); color:var(--ink-soft); transition:transform .12s ease, background .14s ease;}
  .range-chip:hover{transform:translateY(-1px);}
  .range-chip.active{background:var(--coffee); color:#fffaf1; border-color:var(--coffee);}
  .custom-range{display:flex; align-items:center; gap:8px; margin-bottom:12px; flex-wrap:wrap;}
  .custom-range input[type=date]{border:1px solid #d8bd9b; border-radius:10px; padding:7px 10px; font-size:13px; color:var(--ink); background:var(--surface);}
  .custom-range .arrow{color:var(--ink-soft); font-size:13px;}
  .range-label{font-size:12px; color:var(--ink-soft); margin-bottom:16px;}
  .view-scroll>.range-label{color:#fff6e8; text-shadow:0 1px 8px rgba(42,22,12,.42);}
  .view-scroll>.range-label strong{color:#fffaf1;}
  .pay-method-toggle{display:flex; gap:8px; margin:14px 0;}
  .pm-btn{flex:1; padding:10px; border-radius:12px; font-weight:600; font-size:13px;
    background:var(--emerald-light); color:var(--emerald-dark); border:1px solid rgba(47,125,85,.18); display:flex; align-items:center; justify-content:center; gap:6px; transition:transform .12s ease, background .14s ease;}
  .pm-btn:hover{transform:translateY(-1px);}
  .pm-btn.active{background:var(--emerald-dark); color:#fff; border-color:var(--emerald-dark);}
  .transfer-note{display:flex; gap:10px; align-items:flex-start; background:var(--emerald-light);
    border-radius:14px; padding:14px; margin:4px 0 18px; font-size:13px; color:var(--emerald-dark); line-height:1.5;}
  .transfer-note .ticon{font-size:20px;}
  .pm-tag{font-size:10px; font-weight:700; padding:2px 7px; border-radius:999px; margin-left:6px; white-space:nowrap; vertical-align:middle;}
  .pm-tag.cash{background:#fff0df; color:var(--orange-dark);}
  .pm-tag.transfer{background:var(--emerald-light); color:var(--emerald-dark);}
  .history-day{background:var(--surface); border:1px solid var(--border); border-radius:16px; margin-bottom:10px; overflow:hidden;}
  .history-day-head{width:100%; display:flex; align-items:center; justify-content:space-between; padding:14px 16px; text-align:left;}
  .history-day-head .ddate{font-weight:700; font-size:14px;}
  .history-day-head .dmeta{font-size:12px; color:var(--ink-soft); margin-top:2px;}
  .history-day-head .dright{display:flex; align-items:center; gap:10px;}
  .history-day-head .dtotal{font-weight:800; color:var(--emerald-dark); font-size:15px;}
  .history-day-head .chev{color:#9b7a5d; font-size:13px; transition:transform .15s;}
  .history-orders{border-top:1px solid var(--border); padding:4px 16px;}
  .reset-warn{display:flex; align-items:center; gap:6px; font-weight:700; font-size:13.5px; margin-bottom:6px;}
  .reset-note{font-size:12px; color:#9b7a5d; margin-bottom:10px;}
  .reset-link{color:var(--red); font-weight:600; font-size:13px;}
  .reset-confirm{display:flex; align-items:center; gap:8px; font-size:13px;}
  .reset-confirm button{font-size:12px; font-weight:600; padding:6px 12px; border-radius:10px;}
  .reset-confirm .yes{background:var(--red); color:#fff;}
  .reset-confirm .no{background:#f4e9d6; color:#7A4E2B;}
  .backup-actions{display:flex; gap:8px; flex-wrap:wrap; margin:8px 0 4px;}
  .backup-btn{display:inline-flex; align-items:center; justify-content:center; gap:7px; padding:9px 12px; border-radius:12px; font-size:12px; font-weight:800;
    background:#fff0df; color:var(--orange-dark); border:1px solid rgba(242,96,10,.28); transition:transform .12s ease, box-shadow .16s ease;}
  .backup-btn.primary{background:var(--orange); color:#fff; border-color:var(--orange);}
  .backup-btn:hover{transform:translateY(-1px); box-shadow:0 10px 22px rgba(75,46,32,.10);}
  .theme-switch-card{display:flex; align-items:center; justify-content:space-between; gap:14px; border:1.5px dashed var(--border); border-radius:18px; padding:14px 15px; background:linear-gradient(135deg,#fffaf1,#fff3df);}
  .theme-switch-copy{min-width:0;}
  .theme-switch-title{font-weight:900; font-size:14px; color:var(--ink); margin-bottom:3px;}
  .theme-switch-sub{font-size:12px; color:var(--ink-soft); line-height:1.35;}
  .theme-toggle{position:relative; width:74px; height:38px; border-radius:999px; padding:4px; background:var(--coffee); box-shadow:inset 0 0 0 1px rgba(255,250,241,.18), 0 8px 18px rgba(42,22,12,.16); flex-shrink:0; transition:background .18s ease, transform .12s ease;}
  .theme-toggle:active{transform:scale(.97);}
  .theme-toggle-knob{width:30px; height:30px; border-radius:50%; background:#fffaf1; display:flex; align-items:center; justify-content:center; color:var(--orange); font-size:11px; font-weight:900; box-shadow:0 4px 10px rgba(0,0,0,.22); transition:transform .2s ease, color .18s ease;}
  body.theme-matcha .theme-toggle{background:var(--orange);}
  body.theme-matcha .theme-toggle-knob{transform:translateX(36px); color:var(--orange-dark);}
  .author-footer{font-size:12px; font-weight:900; letter-spacing:.12em; line-height:1.5; color:rgba(255,246,232,.38); text-align:center; margin:22px auto 0; max-width:760px; text-shadow:0 1px 1px rgba(255,250,241,.28), 0 -1px 1px rgba(42,22,12,.34);}
  .menu-scroll .author-footer{padding-bottom:96px; margin-top:8px;}
  @media (min-width:768px){ .menu-scroll .author-footer{padding-bottom:18px;} }
  .edge-bounce{animation:edgeBounce .28s ease-out both;}
  @keyframes slideDown{from{opacity:0; transform:translateY(-10px);} to{opacity:1; transform:translateY(0);}}
  @keyframes viewIn{from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:translateY(0);}}
  @keyframes sectionIn{from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:translateY(0);}}
  @keyframes cardPop{from{opacity:0; transform:translateY(8px) scale(.985);} to{opacity:1; transform:translateY(0) scale(1);}}
  @keyframes expandIn{from{opacity:0; transform:scaleY(.96) translateY(-4px);} to{opacity:1; transform:scaleY(1) translateY(0);}}
  @keyframes cartIn{from{opacity:0; transform:translateX(16px);} to{opacity:1; transform:translateX(0);}}
  @keyframes drawerUp{from{opacity:.86; transform:translateY(26px);} to{opacity:1; transform:translateY(0);}}
  @keyframes modalPop{from{opacity:0; transform:translateY(12px) scale(.96);} to{opacity:1; transform:translateY(0) scale(1);}}
  @keyframes fadeIn{from{opacity:0;} to{opacity:1;}}
  @keyframes toastIn{0%{opacity:0; transform:translate(-50%,12px) scale(.96);} 100%{opacity:1; transform:translate(-50%,0) scale(1);}}
  @keyframes listItemIn{from{opacity:0; transform:translateX(8px);} to{opacity:1; transform:translateX(0);}}
  @keyframes tapPop{0%{transform:scale(.92);} 70%{transform:scale(1.08);} 100%{transform:scale(1);}}
  @keyframes edgeBounce{0%{transform:translateY(0);} 38%{transform:translateY(-7px);} 100%{transform:translateY(0);}}
  @keyframes cardBubbleHover{
    0%{ transform:scale(1); }
    35%{ transform:scale(1.045); }
    62%{ transform:scale(.985); }
    85%{ transform:scale(1.015); }
    100%{ transform:scale(1.008); }
  }
  @keyframes cardBubblePress{
    0%{ transform:scale(.90); }
    45%{ transform:scale(1.12); }
    72%{ transform:scale(.97); }
    100%{ transform:scale(1); }
  }
  @media (prefers-reduced-motion: reduce){
    *,*::before,*::after{animation-duration:.01ms !important; animation-iteration-count:1 !important; scroll-behavior:auto !important; transition-duration:.01ms !important;}
  }

// ---------------------------------------------------------------------------
// Phản hồi chạm/bấm TỨC THÌ cho thẻ món, không phụ thuộc vào thời điểm
// trình duyệt quyết định áp dụng :active (trên di động, trình duyệt có thể

// cuộn", gây cảm giác chậm). Ở đây ta tự bật class .is-pressed ngay trong
// sự kiện pointerdown/touchstart — sự kiện này luôn bắn ra ngay lập tức,
// không qua bước phân biệt cử chỉ nào cả — nên hiệu ứng luôn bắt đầu đúng
// lúc ngón tay/con trỏ vừa chạm xuống.
(function setupInstantPress(){
  function press(e){
    const card = e.target.closest && e.target.closest('.menu-card');
    if (card) card.classList.add('is-pressed');
  }
  function release(){
    document.querySelectorAll('.menu-card.is-pressed').forEach(el => el.classList.remove('is-pressed'));
  }
  document.addEventListener('touchstart', press, { passive:true, capture:true });
  document.addEventListener('pointerdown', press, { passive:true, capture:true });
  document.addEventListener('touchend', release, { passive:true, capture:true });
  document.addEventListener('touchcancel', release, { passive:true, capture:true });
  document.addEventListener('pointerup', release, { passive:true, capture:true });

function loadOrders(){
  try {
    const raw = localStorage.getItem(ORDERS_KEY);
    const o = raw ? JSON.parse(raw) : [];
    if (!Array.isArray(o)) return [];
    const sorted = o.slice().sort((a,b) => new Date(a.time || 0) - new Date(b.time || 0));
    let nextNo = 1;
    sorted.forEach(order => {
      if (!Number.isFinite(order.orderNo) || order.orderNo <= 0){
        order.orderNo = nextNo++;
      } else {
        nextNo = Math.max(nextNo, order.orderNo + 1);
      }
    });
    return sorted.sort((a,b) => new Date(b.time || 0) - new Date(a.time || 0));
  } catch(e) { return []; }
}
function loadCategories(){
  try {
    const raw = localStorage.getItem(CATEGORIES_KEY);
    let c = raw ? JSON.parse(raw) : null;
    if (Array.isArray(c) && c.length){
      if (typeof c[0] === 'string'){
        c = c.map((name, i) => ({ id: uid(), name, icon: ICON_CHOICES[i % ICON_CHOICES.length] }));
      }
      c = c.map(cat => ({ id: cat.id || uid(), name: cat.name, icon: flatIcon(cat.icon) }));
      return c;
    }
  } catch(e) {}
  return DEFAULT_CATEGORIES.slice();
}

function playCompletionSound(){
  try{
    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    if (!AudioCtx) return;
    const ctx = new AudioCtx();
    const now = ctx.currentTime;
    const master = ctx.createGain();
    const filter = ctx.createBiquadFilter();
    filter.type = 'highpass';
    filter.frequency.value = 1100;
    filter.Q.value = 0.9;
    master.gain.setValueAtTime(0.0001, now);
    master.gain.exponentialRampToValueAtTime(0.13, now + 0.015);
    master.gain.exponentialRampToValueAtTime(0.0001, now + 0.52);
    filter.connect(master);
    master.connect(ctx.destination);

    const ding = (delay, freq, dur, type) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = type;
      osc.frequency.setValueAtTime(freq, now + delay);
      gain.gain.setValueAtTime(0.0001, now + delay);
      gain.gain.exponentialRampToValueAtTime(1, now + delay + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + delay + dur);
      osc.connect(gain);
      gain.connect(filter);
      osc.start(now + delay);
      osc.stop(now + delay + dur + 0.02);
    };

    // Crisp iPhone-style notification: two bright clean notes.
    ding(0.00, 1760, 0.14, 'sine');
    ding(0.17, 2217, 0.13, 'triangle');

    setTimeout(() => { ctx.close && ctx.close(); }, 700);
  } catch(e) {}
}

function backupLoadFile(input){
  const file = input && input.files && input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const parsed = JSON.parse(String(reader.result || '{}'));
      const data = parsed.data || parsed;
      if (!Array.isArray(data.menu) || !Array.isArray(data.categories)){
        showToast('File backup không đúng định dạng.');
        input.value = '';
        return;
      }
      saveCategories(data.categories);
      saveMenu(data.menu);
      saveOrders(Array.isArray(data.orders) ? data.orders : []);
      saveTheme(data.theme === 'matcha' ? 'matcha' : 'coffee');
      saveNotePresets(Array.isArray(data.notePresets) ? data.notePresets : DEFAULT_NOTE_PRESETS.slice());
      saveCartNotePresets(Array.isArray(data.cartNotePresets) ? data.cartNotePresets : DEFAULT_CART_NOTE_PRESETS.slice());
      saveOptionGroups(Array.isArray(data.optionGroups) ? data.optionGroups : DEFAULT_OPTION_GROUPS.map(group => ({ ...group, options:group.options.map(option=>({ ...option })) })));
      S.cart = [];
      S.activeCategory = (S.categories[0] && S.categories[0].name) || null;
      S.configuringItemId = null;
      S.optionSelections = {};
      input.value = '';
      showToast('Đã load backup dữ liệu.');
      render();
    } catch (e) {
      input.value = '';
      showToast('Không đọc được file backup.');
    }
  };
  reader.readAsText(file);
}

function bounceQtyBadge(itemId){
  let badge;
  try { badge = document.querySelector(`.menu-card[data-key="${CSS.escape(itemId)}"] .qty-badge`); } catch(e){}
  if (!badge) return;
  badge.classList.remove('badge-bounce');
  void badge.offsetWidth;
  badge.classList.add('badge-bounce');
  window.setTimeout(()=>badge.classList.remove('badge-bounce'), 440);
}
function bounceMobileCartBadge(){
  const badge = document.querySelector('.cart-mobile-bar .count-pill');
  if (!badge) return;
  badge.classList.remove('badge-bounce');
  void badge.offsetWidth;
  badge.classList.add('badge-bounce');
  window.setTimeout(()=>badge.classList.remove('badge-bounce'), 440);
}
function handleMenuCardTap(event, id){
  const item = S.menu.find(m=>m.id===id);
  const hasOptions = !!(item && itemOptionGroups(item).length);
  addToCart(id);
  if (!hasOptions){
    bounceQtyBadge(id);
    bounceMobileCartBadge();
  }
}
function addToCart(id){
  const item = S.menu.find(m=>m.id===id);
  if (!item) return;
  if (itemOptionGroups(item).length){
    openItemOptions(id);
    return;
  }
  const found = S.cart.find(c=>c.id===id && (!c.options || c.options.length===0));
  if (found) found.qty += 1;
  else S.cart.push({ lineId:uid(), id:item.id, name:item.name, basePrice:item.price, price:item.price, options:[], qty:1, note:'' });
  render();
}
function openItemOptions(id){
  if (S.configuringItemId === id){
    S.configuringItemId = null;
    S.optionSelections = {};
    S.configuringNote = '';
    S.configuringNoteEditing = false;
    render();
    return;
  }
  const item = S.menu.find(m=>m.id===id);
  if (!item) return;
  const selections = {};
  itemOptionGroups(item).forEach(group => {
    selections[group.id] = group.required && group.type === 'single' && group.options[0] ? [group.options[0].id] : [];
  });
  S.configuringItemId = id;
  S.optionSelections = selections;
  S.configuringNote = '';
  S.configuringNoteEditing = false;
  render();
}
function cancelItemOptions(){
  S.configuringItemId = null;
  S.optionSelections = {};
  S.configuringNote = '';
  S.configuringNoteEditing = false;
  render();
}
function setConfiguringNote(value){ S.configuringNote = value; }
function startConfiguringNoteEdit(){
  S.configuringNoteEditing = true;
  render();
}
function closeConfiguringNoteEdit(){
  const input = document.getElementById('configuringNoteInput');
  if (input) S.configuringNote = input.value;
  S.configuringNoteEditing = false;
  render();
}
function closeConfiguringNoteEditFromInput(event){
  if (event) event.preventDefault();
  const input = document.getElementById('configuringNoteInput');
  if (input) S.configuringNote = input.value;
  closeConfiguringNoteEdit();
}
function clearConfiguringNoteEdit(){
  S.configuringNote = '';
  render();
}
function applyConfiguringNotePreset(value){
  if (!S.configuringNoteEditing) S.configuringNoteEditing = true;
  const base = (S.configuringNote || '').trim();
  const parts = base ? base.split(',').map(s => s.trim()).filter(Boolean) : [];
  if (!parts.some(part => part.toLowerCase() === value.toLowerCase())){
    parts.push(value);
  }
  S.configuringNote = parts.join(', ');
  render();
}
function toggleOptionSelection(groupId, optionId){
  const group = S.optionGroups.find(g=>g.id===groupId);
  if (!group) return;
  const current = Array.isArray(S.optionSelections[groupId]) ? S.optionSelections[groupId].slice() : [];
  if (group.type === 'single'){
    S.optionSelections[groupId] = current.includes(optionId) && !group.required ? [] : [optionId];
  } else {
    S.optionSelections[groupId] = current.includes(optionId) ? current.filter(id=>id!==optionId) : [...current, optionId];
  }
  render();
}
function selectedOptionsForItem(item){
  const selected = [];
  itemOptionGroups(item).forEach(group => {
    const ids = Array.isArray(S.optionSelections[group.id]) ? S.optionSelections[group.id] : [];
    ids.forEach(id => {
      const option = group.options.find(value => value.id === id);
      if (option) selected.push({ groupId:group.id, groupName:group.name, id:option.id, name:option.name, price:Number(option.price)||0 });
    });
  });
  return selected;
}
function configuredPrice(item){
  return item.price + selectedOptionsForItem(item).reduce((sum,option)=>sum+option.price,0);
}
function configurationReady(item){
  return itemOptionGroups(item).every(group => !group.required || (S.optionSelections[group.id] || []).length > 0);
}
function addConfiguredToCart(id){
  const item = S.menu.find(m=>m.id===id);
  if (!item || !configurationReady(item)) return;
  const options = selectedOptionsForItem(item);
  const signature = options.map(option=>option.groupId+':'+option.id).sort().join('|');
  const note = (S.configuringNote || '').trim();
  const found = note ? null : S.cart.find(c => c.id===id && (c.optionSignature || '')===signature && !c.note);
  if (found) found.qty += 1;
  else S.cart.push({
    lineId:uid(), id:item.id, name:item.name, basePrice:item.price,
    price:item.price + options.reduce((sum,option)=>sum+option.price,0),
    options, optionSignature:signature, qty:1, note,
  });
  S.configuringItemId = null;
  S.optionSelections = {};
  S.configuringNote = '';
  S.configuringNoteEditing = false;
  render();
  bounceQtyBadge(id);
  bounceMobileCartBadge();
}
function incQty(lineId){
  const f=S.cart.find(c=>cartLineId(c)===lineId);
  if(f){ f.qty+=1; render(); bounceQtyBadge(f.id); bounceMobileCartBadge(); }
}
function decQty(lineId){
  const f=S.cart.find(c=>cartLineId(c)===lineId);
  if(!f) return;
  f.qty -= 1;
  S.cart = S.cart.filter(c=>c.qty>0);
  if (S.cart.length === 0) S.restoringOrder = null;
  render();
}
function removeFromCart(lineId){
  S.cart = S.cart.filter(c=>cartLineId(c)!==lineId);
  if (S.cartItemNoteEditingId === lineId){
    S.cartItemNoteEditingId = null;
    S.cartItemNoteDraft = '';
  }
  if (S.cart.length === 0) S.restoringOrder = null;
  render();
}
function askRemoveFromCart(lineId){ S.confirmRemoveLineId = lineId; render(); }
function cancelRemoveFromCart(){ S.confirmRemoveLineId = null; render(); }
function confirmRemoveFromCart(){

  S.confirmRemoveLineId = null;

}

function setPaymentMethod(method){

  render();
  if (method === 'cash'){
    const input = document.getElementById('cashInput');
    if (input) {
      input.value = '';
      onCashInput();
      input.focus({ preventScroll: true });
    }
  }
}

function setCash(v, mode='add'){
  const input = document.getElementById('cashInput');
  if (!input) return;
  const current = Number(input.value) || 0;
  const next = mode === 'replace' ? v : current + v;
  input.value = String(Math.max(0, next));
  onCashInput();
}
function adjustCash(delta){
  const input = document.getElementById('cashInput');
  if (!input) return;
  const current = Number(input.value) || 0;
  input.value = String(Math.max(0, current + delta));
  onCashInput();
}
function clearCashInput(){
  const input = document.getElementById('cashInput');
  if (!input) return;
  input.value = '0';
  onCashInput();
  input.focus({ preventScroll: true });
}

function onCashInput(){
  const input = document.getElementById('cashInput');
  const total = cartTotal();
  const raw = input ? input.value : '';
  const received = raw === '' ? total : (Number(raw) || 0);
  const change = Math.max(0, received - total);
  const insufficient = received < total;
  const changeEl = document.getElementById('changeVal');
  const confirmBtn = document.getElementById('confirmBtn');
  if (changeEl){
    changeEl.innerHTML = insufficient
      ? '<span class="amt danger">CHƯA ĐỦ</span>'
      : '<span class="amt">' + moneyText(change) + '</span><span class="unit">vnđ</span>';
  }
  if (confirmBtn) confirmBtn.disabled = insufficient;
}

function confirmCheckout(){
  flushPendingCartNotes();
  const total = cartTotal();
  let received, change;
  if (S.paymentMethod === 'transfer'){
    received = total;
    change = 0;
  } else {
    const input = document.getElementById('cashInput');
    const raw = input ? input.value : '';
    received = raw === '' ? total : (Number(raw) || 0);
    if (received < total) return;
    change = received - total;
  }
  const order = {
    id: uid(),
    orderNo: S.restoringOrder ? S.restoringOrder.orderNo : getNextOrderNo(),
    adjusted: !!S.restoringOrder,
    time: new Date().toISOString(),
    items: S.cart.map(c=>({
      id:c.id, name:c.name, basePrice:c.basePrice || c.price, price:c.price, qty:c.qty,
      options:(c.options || []).map(option=>({ ...option })),
      note: c.note || '',
    })),
    total,
    received,
    change,
    paymentMethod: S.paymentMethod,
    note: S.cartNote.trim(),
  };
  saveOrders([order, ...S.orders]);
  S.successTicket = null;
  S.restoringOrder = null;
  S.cart = [];
  S.cartNote = '';
  S.cartNoteDraft = '';
  S.cartNoteEditing = false;
  S.cartItemNoteEditingId = null;
  S.cartItemNoteDraft = '';
  S.checkoutOpen = false;
  S.cartDrawerOpen = false;
  S.view = 'pos';
  playCompletionSound();
  showCompletion(order);
  render();
}

function deleteMenuItem(id){ saveMenu(S.menu.filter(m=>m.id!==id)); render(); }
function toggleItemOptionGroup(itemId, groupId, checked){
  saveMenu(S.menu.map(item => {
    if (item.id !== itemId) return item;
    const ids = Array.isArray(item.optionGroupIds) ? item.optionGroupIds.slice() : [];
    const next = checked ? [...new Set([...ids, groupId])] : ids.filter(id=>id!==groupId);
    return { ...item, optionGroupIds:next };
  }));
  render();
}

function toggleCategoryOptionGroup(categoryId, groupId, checked){
  const category = S.categories.find(cat => cat.id === categoryId);
  if (!category) return;
  const itemCount = S.menu.filter(item => item.category === category.name).length;
  if (!itemCount){ showToast('Nhóm này chưa có món để áp dụng.'); return; }
  saveMenu(S.menu.map(item => {
    if (item.category !== category.name) return item;
    const ids = Array.isArray(item.optionGroupIds) ? item.optionGroupIds.slice() : [];
    const optionGroupIds = checked
      ? [...new Set([...ids, groupId])]
      : ids.filter(id => id !== groupId);
    return { ...item, optionGroupIds };
  }));
  const optionGroup = S.optionGroups.find(group => group.id === groupId);
  showToast((checked ? 'Đã áp dụng ' : 'Đã gỡ ') + '"' + (optionGroup ? optionGroup.name : 'option') + '" cho ' + itemCount + ' món.');
  render();
}

function addOptionValue(groupId){
  const draft = readOptionGroupForm(groupId);
  saveOptionGroups(S.optionGroups.map(group => group.id===groupId
    ? { ...(draft || group), options:[...(draft ? draft.options : group.options), { id:uid(), name:'Lựa chọn mới', price:0 }] }

function deleteOptionValue(groupId, optionId){
  const draft = readOptionGroupForm(groupId);

// ---------------------------------------------------------------------------
// Drag & drop reordering (Pointer Events — works with mouse and touch)
// ---------------------------------------------------------------------------
let dragState = null;
const DRAG_HOLD_MS = 420;   // press-and-hold duration required before a drag starts
const DRAG_CANCEL_PX = 8;   // movement allowed while holding before we treat it as a scroll, not a drag

function dragHandlePointerDown(ev, type, id){
  const interactive = ev.target.closest && ev.target.closest('button,input,select,textarea,label');
  if (interactive && !ev.target.classList.contains('grip')) return;
  ev.preventDefault();
  const selector = type === 'item' ? '.item-edit-row' : '.cat-card';
  const row = ev.currentTarget.closest(selector);
  if (!row) return;
  dragState = {
    type, id, sourceRow: row, overEl: null,
    startX: ev.clientX, startY: ev.clientY,
    ghost: null, started: false, holdTimer: null,
    pointerId: ev.pointerId, handle: ev.currentTarget
  };
  dragState.holdTimer = setTimeout(() => beginDrag(ev.clientX, ev.clientY), DRAG_HOLD_MS);
  window.addEventListener('pointermove', onDragPointerMove);
  window.addEventListener('pointerup', onDragPointerUp);
  window.addEventListener('pointercancel', onDragPointerCancel);
}

function beginDrag(clientX, clientY){
  if (!dragState || dragState.started) return;
  const row = dragState.sourceRow;
  const rect = row.getBoundingClientRect();
  document.body.classList.add('dragging-active');
  try {
    if (dragState.handle && dragState.handle.setPointerCapture){
      dragState.handle.setPointerCapture(dragState.pointerId);
    }
  } catch(e) {}
  const ghost = row.cloneNode(true);
  ghost.classList.add('drag-ghost');
  ghost.style.position = 'fixed';
  ghost.style.left = rect.left + 'px';
  ghost.style.top = rect.top + 'px';
  ghost.style.width = rect.width + 'px';
  ghost.style.margin = '0';
  document.body.appendChild(ghost);
  row.classList.add('drag-source-hidden');
  dragState.ghost = ghost;
  dragState.started = true;
  ghost.style.transform = `translate(${clientX - dragState.startX}px, ${clientY - dragState.startY}px)`;
}

// Shared cleanup for both a finished drag and an aborted one (drag never
// started, or the browser took over the gesture as a scroll/pointercancel).
function teardownDrag(){
  if (!dragState) return;
  window.removeEventListener('pointermove', onDragPointerMove);
  window.removeEventListener('pointerup', onDragPointerUp);
  window.removeEventListener('pointercancel', onDragPointerCancel);
  if (dragState.holdTimer) clearTimeout(dragState.holdTimer);
  document.body.classList.remove('dragging-active');
  try {
    if (dragState.handle && dragState.handle.releasePointerCapture){
      dragState.handle.releasePointerCapture(dragState.pointerId);
    }
  } catch(e) {}
  document.querySelectorAll('.drop-indicator').forEach(e=>e.classList.remove('drop-indicator'));
  document.querySelectorAll('.drop-indicator-cat').forEach(e=>e.classList.remove('drop-indicator-cat'));
  if (dragState.ghost) dragState.ghost.remove();
  if (dragState.sourceRow) dragState.sourceRow.classList.remove('drag-source-hidden');
}

function onDragPointerCancel(){
  teardownDrag();
  dragState = null;
}

function onDragPointerMove(ev){
  if (!dragState) return;
  const dx = ev.clientX - dragState.startX;
  const dy = ev.clientY - dragState.startY;
  if (!dragState.started){
    // Still waiting out the press-and-hold delay. A real drag intent holds
    // (almost) still; noticeable movement this early means the finger is
    // scrolling, not holding — back off and let the page scroll normally
    // instead of hijacking the gesture into a drag.
    if (Math.hypot(dx, dy) > DRAG_CANCEL_PX) onDragPointerCancel();
    return;
  }
  ev.preventDefault();
  dragState.ghost.style.transform = `translate(${dx}px, ${dy}px)`;
  autoScrollWhileDragging(ev.clientY);

  dragState.ghost.style.visibility = 'hidden';
  const el = document.elementFromPoint(ev.clientX, ev.clientY);
  dragState.ghost.style.visibility = 'visible';

  document.querySelectorAll('.drop-indicator').forEach(e=>e.classList.remove('drop-indicator'));
  document.querySelectorAll('.drop-indicator-cat').forEach(e=>e.classList.remove('drop-indicator-cat'));
  dragState.overEl = null;
  if (!el) return;

  if (dragState.type === 'item'){
    const row = el.closest('.item-edit-row');
    if (row && row !== dragState.sourceRow){
      row.classList.add('drop-indicator');
      dragState.overEl = row;
    } else {
      const card = el.closest('.cat-card');
      if (card){ card.classList.add('drop-indicator-cat'); dragState.overEl = card; }
    }
  } else {
    const card = el.closest('.cat-card');
    if (card && card !== dragState.sourceRow){
      card.classList.add('drop-indicator-cat');
      dragState.overEl = card;
    }
  }
}

function autoScrollWhileDragging(clientY){
  const scrollHost = dragState && dragState.sourceRow
    ? dragState.sourceRow.closest('.view-scroll,.menu-scroll,.cart-list')
    : null;
  if (!scrollHost) return;
  const rect = scrollHost.getBoundingClientRect();
  const edge = 58;
  const maxStep = 18;
  let step = 0;
  if (clientY < rect.top + edge) step = -Math.ceil((rect.top + edge - clientY) / edge * maxStep);
  else if (clientY > rect.bottom - edge) step = Math.ceil((clientY - (rect.bottom - edge)) / edge * maxStep);
  if (step) scrollHost.scrollTop += step;
}

function onDragPointerUp(){
  if (!dragState) return;
  const { type, id, overEl, started } = dragState;
  teardownDrag();
  dragState = null;
  if (!started) return;

  if (type === 'item') finalizeItemDrag(id, overEl);
  else finalizeCatDrag(id, overEl);
}

function finalizeItemDrag(itemId, overEl){
  if (!overEl){ render(); return; }
  const menu = S.menu.slice();
  const fromIdx = menu.findIndex(m=>m.id===itemId);
  if (fromIdx === -1){ render(); return; }
  const [moved] = menu.splice(fromIdx, 1);

  if (overEl.classList.contains('item-edit-row')){
    const targetId = overEl.dataset.itemId;
    const targetItem = S.menu.find(m=>m.id===targetId);
    if (targetItem) moved.category = targetItem.category;
    const toIdx = menu.findIndex(m=>m.id===targetId);
    if (toIdx === -1) menu.push(moved); else menu.splice(toIdx, 0, moved);
  } else if (overEl.classList.contains('cat-card')){
    moved.category = overEl.dataset.catName;
    menu.push(moved);
  } else {
    menu.splice(fromIdx, 0, moved);
  }
  saveMenu(menu);
  render();
}

function finalizeCatDrag(catId, overEl){
  if (!overEl || !overEl.classList.contains('cat-card')){ render(); return; }
  const targetId = overEl.dataset.catId;
  if (targetId === catId){ render(); return; }
  const cats = S.categories.slice();
  const fromIdx = cats.findIndex(c=>c.id===catId);
  if (fromIdx === -1){ render(); return; }
  const [moved] = cats.splice(fromIdx, 1);
  const toIdx = cats.findIndex(c=>c.id===targetId);
  if (toIdx === -1) cats.push(moved); else cats.splice(toIdx, 0, moved);
  saveCategories(cats);
  render();
}

// Reports: date range filter, grouping by day, styled offline Excel export
// ---------------------------------------------------------------------------
function localDateKey(d){
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function formatDMY(key){ const [y,m,d] = key.split('-'); return `${d}/${m}/${y}`; }
function dayLabel(key){
  const todayKey = localDateKey(new Date());
  const yestKey = localDateKey(new Date(Date.now() - 86400000));
  if (key === todayKey) return 'Hôm nay · ' + formatDMY(key);
  if (key === yestKey) return 'Hôm qua · ' + formatDMY(key);
  return formatDMY(key);
}
function rangeLabel(){
  if (S.reportFrom === null && S.reportTo === null) return 'Tất cả thời gian';
  if (S.reportFrom === S.reportTo) return dayLabel(S.reportFrom);
  return formatDMY(S.reportFrom) + ' → ' + formatDMY(S.reportTo);
}
function filteredOrders(){
  if (S.reportFrom === null && S.reportTo === null) return S.orders.slice();
  return S.orders.filter(o => {
    const k = localDateKey(new Date(o.time));
    return (!S.reportFrom || k >= S.reportFrom) && (!S.reportTo || k <= S.reportTo);
  });
}
function groupOrdersByDay(list){
  const groups = {};
  list.forEach(o => {
    const key = localDateKey(new Date(o.time));
    if (!groups[key]) groups[key] = [];
    groups[key].push(o);
  });
  return Object.entries(groups).sort((a,b) => b[0].localeCompare(a[0]));
}
function setReportPreset(preset){
  const todayK = localDateKey(new Date());
  if (preset === 'today'){ S.reportFrom = todayK; S.reportTo = todayK; }
  else if (preset === 'yesterday'){ const y = localDateKey(new Date(Date.now()-86400000)); S.reportFrom = y; S.reportTo = y; }
  else if (preset === '7d'){ S.reportFrom = localDateKey(new Date(Date.now()-6*86400000)); S.reportTo = todayK; }
  else if (preset === '30d'){ S.reportFrom = localDateKey(new Date(Date.now()-29*86400000)); S.reportTo = todayK; }
  else if (preset === 'all'){ S.reportFrom = null; S.reportTo = null; }
  S.reportPreset = preset;
  S.expandedReportDay = null;
  render();
}
function setCustomRange(){

function rangeLabelExport(orders){
  if (S.reportFrom && S.reportTo){
    return S.reportFrom === S.reportTo ? formatDMY(S.reportFrom) : formatDMY(S.reportFrom) + ' đến ' + formatDMY(S.reportTo);
  }
  if (orders.length === 0) return '';
  const dates = orders.map(o => localDateKey(new Date(o.time)));
  const minD = dates.reduce((a,b) => a < b ? a : b);
  const maxD = dates.reduce((a,b) => a > b ? a : b);
  return formatDMY(minD) + ' đến ' + formatDMY(maxD);
}
function xmlEscape(v){
  return String(v == null ? '' : v).replace(/[<>&"']/g, c => ({
    '<':'&lt;', '>':'&gt;', '&':'&amp;', '"':'&quot;', "'":'&apos;'
  }[c]));
}
function xlsxColumnName(n){
  let name = '';
  while (n > 0){ n--; name = String.fromCharCode(65 + (n % 26)) + name; n = Math.floor(n / 26); }
  return name;
}
function xlsxCell(ref, value, style=0){
  if (value && typeof value === 'object' && value.formula){
    if (typeof value.cached === 'string'){
      return `<c r="${ref}" s="${style}" t="str"><f>${xmlEscape(value.formula)}</f><v>${xmlEscape(value.cached)}</v></c>`;
    }
    return `<c r="${ref}" s="${style}"><f>${xmlEscape(value.formula)}</f><v>${Number(value.cached)||0}</v></c>`;
  }
  if (typeof value === 'number'){
    return `<c r="${ref}" s="${style}" t="n"><v>${Number.isFinite(value)?value:0}</v></c>`;
  }
  return `<c r="${ref}" s="${style}" t="inlineStr"><is><t xml:space="preserve">${xmlEscape(value)}</t></is></c>`;

function makeXlsxSheet(rows, merges=[], options={}){
  const lastRow = Math.max(1, rows.length);
  const lastCol = options.lastCol || 'H';
  const cols = options.cols || [];
  const colsXml = cols.length ? `<cols>${cols.map((width,index) =>
    `<col min="${index+1}" max="${index+1}" width="${width}" customWidth="1"/>`
  ).join('')}</cols>` : '';
  const paneXml = options.freezeRows
    ? `<pane ySplit="${options.freezeRows}" topLeftCell="A${options.freezeRows+1}" activePane="bottomLeft" state="frozen"/>`
    : '';
  const rowsXml = rows.map((row,index) => {
    const r = index + 1;
    const cells = (row.cells || []).map(cell => xlsxCell(cell.ref || (xlsxColumnName(cell.col)+r), cell.value, cell.style)).join('');
    return `<row r="${r}"${row.height?` ht="${row.height}" customHeight="1"`:''}>${cells}</row>`;
  }).join('');
  const mergeXml = merges.length ? `<mergeCells count="${merges.length}">${merges.map(ref=>`<mergeCell ref="${ref}"/>`).join('')}</mergeCells>` : '';
  const filterXml = options.autoFilter ? `<autoFilter ref="${options.autoFilter}"/>` : '';
  return `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<worksheet xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main">
  <sheetPr><pageSetUpPr fitToPage="1"/></sheetPr>
  <dimension ref="A1:${lastCol}${lastRow}"/>
  <sheetViews><sheetView workbookViewId="0" showGridLines="0">${paneXml}</sheetView></sheetViews>
  <sheetFormatPr defaultRowHeight="18"/>
  ${colsXml}
  <sheetData>${rowsXml}</sheetData>
  ${filterXml}${mergeXml}
  <pageMargins left="0.3" right="0.3" top="0.5" bottom="0.5" header="0.2" footer="0.2"/>
  <pageSetup orientation="landscape" fitToWidth="1" fitToHeight="0" paperSize="9"/>
</worksheet>`;
}
function crc32(bytes){
  if (!crc32.table){
    crc32.table = Array.from({length:256}, (_,n) => {
      let c = n;
      for (let k=0;k<8;k++) c = (c & 1) ? (0xEDB88320 ^ (c >>> 1)) : (c >>> 1);
      return c >>> 0;
    });
  }
  let crc = 0xFFFFFFFF;
  for (const byte of bytes) crc = crc32.table[(crc ^ byte) & 0xFF] ^ (crc >>> 8);
  return (crc ^ 0xFFFFFFFF) >>> 0;
}
function createZip(files){
  const encoder = new TextEncoder();
  const chunks = [], central = [];
  let offset = 0;
  const push16 = (view,pos,value) => view.setUint16(pos,value,true);
  const push32 = (view,pos,value) => view.setUint32(pos,value>>>0,true);
  Object.entries(files).forEach(([name,content]) => {
    const nameBytes = encoder.encode(name);
    const data = typeof content === 'string' ? encoder.encode(content) : content;
    const crc = crc32(data);
    const local = new Uint8Array(30 + nameBytes.length);
    const lv = new DataView(local.buffer);
    push32(lv,0,0x04034b50); push16(lv,4,20); push16(lv,6,0); push16(lv,8,0);
    push16(lv,10,0); push16(lv,12,0); push32(lv,14,crc); push32(lv,18,data.length);
    push32(lv,22,data.length); push16(lv,26,nameBytes.length); push16(lv,28,0);
    local.set(nameBytes,30);
    chunks.push(local,data);

    const cd = new Uint8Array(46 + nameBytes.length);
    const cv = new DataView(cd.buffer);
    push32(cv,0,0x02014b50); push16(cv,4,20); push16(cv,6,20); push16(cv,8,0); push16(cv,10,0);
    push16(cv,12,0); push16(cv,14,0); push32(cv,16,crc); push32(cv,20,data.length);
    push32(cv,24,data.length); push16(cv,28,nameBytes.length); push16(cv,30,0); push16(cv,32,0);
    push16(cv,34,0); push16(cv,36,0); push32(cv,38,0); push32(cv,42,offset);
    cd.set(nameBytes,46);
    central.push(cd);
    offset += local.length + data.length;
  });
  const centralOffset = offset;
  const centralSize = central.reduce((sum,chunk)=>sum+chunk.length,0);
  const end = new Uint8Array(22);
  const ev = new DataView(end.buffer);
  push32(ev,0,0x06054b50); push16(ev,4,0); push16(ev,6,0);
  push16(ev,8,central.length); push16(ev,10,central.length);
  push32(ev,12,centralSize); push32(ev,16,centralOffset); push16(ev,20,0);
  const total = chunks.reduce((sum,chunk)=>sum+chunk.length,0) + centralSize + end.length;
  const output = new Uint8Array(total);
  let position = 0;
  [...chunks,...central,end].forEach(chunk => { output.set(chunk,position); position += chunk.length; });
  return output;
}
function exportExcel(){
  const orders = filteredOrders();
  if (orders.length === 0){ showToast('Không có dữ liệu trong khoảng đã chọn.'); return; }

  const revenue = orders.reduce((s,o)=>s+o.total,0);
  const cups = orders.reduce((s,o)=> s + o.items.reduce((a,i)=>a+i.qty,0), 0);
  const cashTotal = orders.filter(o=>o.paymentMethod!=='transfer').reduce((s,o)=>s+o.total,0);
  const transferTotal = orders.filter(o=>o.paymentMethod==='transfer').reduce((s,o)=>s+o.total,0);

  const qtyCounts = {}, revCounts = {};
  orders.forEach(o => o.items.forEach(i => {
    qtyCounts[i.name] = (qtyCounts[i.name]||0) + i.qty;
    revCounts[i.name] = (revCounts[i.name]||0) + i.qty*i.price;
  }));
  const topItems = Object.entries(qtyCounts).map(([name,qty])=>({name,qty,revenue:revCounts[name]||0}))
    .sort((a,b)=>b.qty-a.qty || b.revenue-a.revenue).slice(0,5);
  const maxQty = Math.max(1, ...topItems.map(item=>item.qty));
  const maxPayment = Math.max(1,cashTotal,transferTotal);

function renderMenuGrid(){

  S.menu.forEach(item => {

  const sections = Array.from(categoryMap.entries())

function buildDailyRevenueSeries(orders){
  const map = {};
  orders.forEach(o => {
    const key = localDateKey(new Date(o.time));
    map[key] = (map[key]||0) + o.total;
  });
  return Object.entries(map).sort((a,b)=>a[0].localeCompare(b[0])).map(([key,total])=>({key,total}));
}
function renderRevenueLineChart(orders){
  const series = buildDailyRevenueSeries(orders);
  if (!series.length){
    return `<div class="chart-empty">Chưa có dữ liệu doanh thu trong khoảng này.</div>`;
  }
  const W = 640, H = 200, padL = 44, padR = 12, padT = 22, padB = 26;
  const innerW = W - padL - padR, innerH = H - padT - padB;
  const maxVal = Math.max(...series.map(p=>p.total), 1);
  const n = series.length;
  const stepX = n > 1 ? innerW / (n-1) : 0;
  const points = series.map((p,i) => {
    const x = padL + (n>1 ? i*stepX : innerW/2);
    const y = padT + innerH - (p.total/maxVal)*innerH;
    const [, m, d] = p.key.split('-');
    return { x, y, total:p.total, label:`${d}/${m}` };
  });
  const fmt = (v) => v.toFixed(1);
  const linePath = points.map((pt,i)=> (i===0?'M':'L') + fmt(pt.x) + ',' + fmt(pt.y)).join(' ');
  const floorY = fmt(padT+innerH);
  const areaPath = `${linePath} L${fmt(points[points.length-1].x)},${floorY} L${fmt(points[0].x)},${floorY} Z`;
  const gridLines = [0,.25,.5,.75,1].map(t => {
    const y = padT + innerH*(1-t);
    const val = Math.round(maxVal*t);
    const valLabel = val>=1000 ? Math.round(val/1000)+'k' : String(val);
    return `<line x1="${padL}" y1="${fmt(y)}" x2="${W-padR}" y2="${fmt(y)}" stroke="rgba(75,46,32,.10)" stroke-width="1"/>
      <text x="${padL-8}" y="${fmt(y+3)}" text-anchor="end" font-size="9" fill="#9b7a5d">${valLabel}</text>`;
  }).join('');
  const peakIdx = points.reduce((best,pt,i)=> pt.total>points[best].total ? i : best, 0);
  const dots = points.map((pt,i) => `
    <circle cx="${fmt(pt.x)}" cy="${fmt(pt.y)}" r="3.6" fill="#fff" stroke="var(--orange)" stroke-width="2.2"/>
    ${i===peakIdx || i===points.length-1 ? `<text x="${fmt(pt.x)}" y="${fmt(pt.y-9)}" text-anchor="middle" font-size="10" font-weight="800" fill="var(--orange-dark)">${moneyText(pt.total)}</text>` : ''}
  `).join('');
  const labelEvery = Math.max(1, Math.ceil(n/7));
  const labels = points.map((pt,i) => (i % labelEvery === 0 || i===points.length-1) ?
    `<text x="${fmt(pt.x)}" y="${H-8}" text-anchor="middle" font-size="9" fill="#9b7a5d">${pt.label}</text>` : '').join('');
  return `
  <div class="chart-wrap">
    <svg viewBox="0 0 ${W} ${H}" class="line-chart-svg" preserveAspectRatio="xMidYMid meet">
      <defs>
        <linearGradient id="revFillGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="var(--orange)" stop-opacity=".32"/>
          <stop offset="100%" stop-color="var(--orange)" stop-opacity="0"/>
        </linearGradient>
      </defs>
      ${gridLines}
      <path d="${areaPath}" fill="url(#revFillGrad)" stroke="none"/>
      <path d="${linePath}" fill="none" stroke="var(--orange)" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
      ${dots}
      ${labels}
    </svg>
  </div>`;
}
function renderTopItemsDonutChart(counts){
  const sortedAll = Object.entries(counts).map(([name,qty])=>({name,qty})).sort((a,b)=>b.qty-a.qty);
  const totalQty = sortedAll.reduce((s,x)=>s+x.qty,0);
  if (!totalQty){
    return `<div class="chart-empty">Chưa có dữ liệu trong khoảng này.</div>`;
  }
  const top = sortedAll.slice(0,5);
  const othersQty = sortedAll.slice(5).reduce((s,x)=>s+x.qty,0);
  const segItems = othersQty>0 ? [...top, {name:'Khác', qty:othersQty}] : top;
  const palette = S.theme === 'matcha'
    ? ['#6f7a48','#202b18','#9aaa68','#c8cba9','#4f5d34','#aeb58d']
    : ['#F2600A','#4B2E20','#FF8A2E','#C79A6B','#7A4E2B','#C24C08'];
  const r = 54, cx = 70, cy = 70, sw = 22;
  const C = 2*Math.PI*r;
  let cumulative = 0;
  const segs = segItems.map((it,i) => {
    const pct = (it.qty/totalQty)*100;
    const dash = (pct/100)*C;
    const offset = -(cumulative/100)*C;
    cumulative += pct;
    return { ...it, pct, dash, gap:C-dash, offset, color:palette[i % palette.length] };
  });
  const arcs = segs.map(s => `
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${s.color}" stroke-width="${sw}"
      stroke-dasharray="${s.dash.toFixed(2)} ${s.gap.toFixed(2)}" stroke-dashoffset="${s.offset.toFixed(2)}"
      transform="rotate(-90 ${cx} ${cy})"/>`).join('');
  const legend = segs.map(s => `
    <div class="donut-legend-row">
      <span class="donut-dot" style="background:${s.color}"></span>
      <span class="donut-name">${esc(displayItemName(s.name))}</span>
      <span class="donut-pct">${s.pct.toFixed(1)}%</span>
      <span class="donut-qty">${s.qty} ly</span>
    </div>`).join('');
  return `
  <div class="donut-wrap">
    <svg viewBox="0 0 140 140" class="donut-svg">
      <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#f0e3cf" stroke-width="${sw}"/>
      ${arcs}
      <text x="${cx}" y="${cy-3}" text-anchor="middle" font-size="22" font-weight="800" fill="var(--ink)">${totalQty}</text>
      <text x="${cx}" y="${cy+14}" text-anchor="middle" font-size="9" fill="#9b7a5d">ly đã bán</text>
    </svg>
    <div class="donut-legend">${legend}</div>
  </div>`;
}
function renderReports(){
  const orders = filteredOrders();
  const revenue = orders.reduce((s,o)=>s+o.total,0);
  const cups = orders.reduce((s,o)=> s + o.items.reduce((a,i)=>a+i.qty,0), 0);
  const cashTotal = orders.filter(o=>o.paymentMethod!=='transfer').reduce((s,o)=>s+o.total,0);
  const transferTotal = orders.filter(o=>o.paymentMethod==='transfer').reduce((s,o)=>s+o.total,0);
  const maxPm = Math.max(cashTotal, transferTotal, 1);

  const counts = {};
  orders.forEach(o => o.items.forEach(i => { counts[i.name] = (counts[i.name]||0) + i.qty; }));
  const topItems = Object.entries(counts).map(([name,qty])=>({name,qty})).sort((a,b)=>b.qty-a.qty).slice(0,5);
  const maxQty = topItems.length ? topItems[0].qty : 1;

  const groups = groupOrdersByDay(orders);
  const presets = [
    {id:'today', label:'Hôm nay'},
    {id:'yesterday', label:'Hôm qua'},
    {id:'7d', label:'7 ngày qua'},
    {id:'30d', label:'30 ngày qua'},
    {id:'all', label:'Tất cả'},
  ];

  return `
  <div class="view-scroll">
    <div class="history-toolbar">
      <h3>Báo cáo bán hàng</h3>
      <button class="btn-export" onclick="exportExcel()">Xuất Excel</button>
    </div>

    <div class="report-hero">
      <div class="report-hero-top">
        <div>
          <h2>Tổng quan vận hành</h2>
          <div class="sub">Bản chụp nhanh theo khoảng thời gian đang chọn, tối ưu cho theo dõi doanh thu và món bán chạy.</div>
        </div>
        <div class="mini-pill">Đang xem: <strong>${rangeLabel()}</strong></div>
      </div>
      <div class="report-kpis">
        <span class="report-kpi">Doanh thu <strong>${vnd(revenue)}</strong></span>
        <span class="report-kpi">Số đơn <strong>${orders.length}</strong></span>
        <span class="report-kpi">Ly đã bán <strong>${cups}</strong></span>
      </div>
    </div>

    <div class="range-chips">
      ${presets.map(p=>`<button class="range-chip ${S.reportPreset===p.id?'active':''}" onclick="setReportPreset('${p.id}')">${p.label}</button>`).join('')}
    </div>
    <div class="custom-range">
      <input autocomplete="new-password" data-lpignore="true" data-form-type="other" type="date" id="reportFromInput" value="${S.reportFrom||''}" onchange="setCustomRange()">
      <span class="arrow">→</span>
      <input autocomplete="new-password" data-lpignore="true" data-form-type="other" type="date" id="reportToInput" value="${S.reportTo||''}" onchange="setCustomRange()">
    </div>
    <div class="range-label">Bộ lọc hiện tại: <strong>${rangeLabel()}</strong></div>

    <div class="stat-grid">
      <div class="stat-card"><div class="lbl">Doanh thu</div><div class="val" style="color:var(--emerald-dark)">${vnd(revenue)}</div></div>
      <div class="stat-card"><div class="lbl">Số đơn</div><div class="val" style="color:var(--orange)">${orders.length}</div></div>
      <div class="stat-card"><div class="lbl">Ly đã bán</div><div class="val">${cups}</div></div>
    </div>

    <div class="panel" style="margin-top:16px;">
      <h3>Doanh thu theo thời gian</h3>
      ${renderRevenueLineChart(orders)}
    </div>

    <div class="panel" style="margin-top:16px;">
      <h3>Phân bổ tỷ lệ % món bán chạy</h3>
      ${renderTopItemsDonutChart(counts)}
    </div>

    <div class="panels-grid" style="margin-top:16px;">
      <div class="panel">
        <h3>Phương thức thanh toán</h3>
        <div class="bar-row">
          <div class="top"><span>TM Tiền mặt</span><span class="muted">${vnd(cashTotal)}</span></div>
          <div class="bar-track"><div class="bar-fill" style="width:${Math.max(6,(cashTotal/maxPm)*100)}%"></div></div>
        </div>
        <div class="bar-row">
          <div class="top"><span>CK Chuyển khoản</span><span class="muted">${vnd(transferTotal)}</span></div>
          <div class="bar-track"><div class="bar-fill" style="width:${Math.max(6,(transferTotal/maxPm)*100)}%; background:var(--orange);"></div></div>
        </div>
      </div>
      <div class="panel">
        <h3>Món bán chạy nhất</h3>
        ${topItems.length===0 ? `<p class="muted">Chưa có dữ liệu trong khoảng này.</p>` :
          topItems.map(t => `
          <div class="bar-row">
            <div class="top"><span>${esc(displayItemName(t.name))}</span><span class="muted">${t.qty} ly</span></div>
            <div class="bar-track"><div class="bar-fill" style="width:${Math.max(6,(t.qty/maxQty)*100)}%"></div></div>
          </div>`).join('')}
      </div>
    </div>

    <div style="margin-top:18px;">
      ${groups.length === 0 ? `
        <div class="panel"><p class="muted" style="margin:0;">Không có đơn hàng nào trong khoảng đã chọn.</p></div>
      ` : groups.map(([key, dayOrders]) => {
        const dTotal = dayOrders.reduce((s,o)=>s+o.total,0);
        const dCups = dayOrders.reduce((s,o)=> s + o.items.reduce((a,i)=>a+i.qty,0), 0);
        const open = S.expandedReportDay === key;
        return `
        <div class="history-day" data-key="${esc(key)}">
          <button class="history-day-head" onclick="toggleReportDay('${key}')">
            <div>
              <div class="ddate">${dayLabel(key)}</div>
              <div class="dmeta">${dayOrders.length} đơn · ${dCups} ly</div>
            </div>
            <div class="dright">
              <span class="dtotal">${vnd(dTotal)}</span>
              <span class="chev" style="transform:${open?'rotate(90deg)':'none'}">▸</span>
            </div>
          </button>
          ${open ? `
          <div class="history-orders">
            ${dayOrders.map(o => `
              <div class="order-row" data-key="${o.id}">
                <div>
                  <div class="otitle"><span class="order-code">${esc(formatOrderCode(o.orderNo))}</span> · ${o.items.map(i=>`${i.qty}× ${esc(displayItemName(i.name))}${i.options && i.options.length ? ` (${esc(optionSummary(i.options))})` : ''}`).join(', ')}<span class="pm-tag ${o.paymentMethod==='transfer'?'transfer':'cash'}">${o.paymentMethod==='transfer'?'CK':'TM'}</span></div>
                  <div class="otime">${new Date(o.time).toLocaleTimeString('vi-VN',{hour:'2-digit',minute:'2-digit'})}</div>
                </div>
                <div class="order-actions">
                  <span class="ototal">${vnd(o.total)}</span>
                  <button class="order-reprint" type="button" onclick="openReprintChoice('${o.id}')">In lại</button>
                  <button class="order-undo" type="button" onclick="askUndoOrder('${o.id}')" title="Phục hồi đơn để điều chỉnh" aria-label="Phục hồi đơn để điều chỉnh">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                      <polyline points="9 14 4 9 9 4"></polyline>
                      <path d="M20 20v-7a4 4 0 0 0-4-4H4"></path>
                    </svg>
                  </button>
                </div>
              </div>`).join('')}
          </div>` : ''}
        </div>`;
      }).join('')}
    </div>
    ${renderAuthorFooter()}
  </div>`;
}

  return `
  <div class="modal-overlay">
    <div class="modal-bg" onclick="closeTicket()"></div>
    <div class="modal-card ticket">
      <div class="ok-circle">${ic('check')}</div>
      <div class="eyebrow">Đơn hàng hoàn tất · ${pmText}</div>

        ${t.items.map(i=>`<div class="trow"><span>${i.qty}× ${esc(displayItemName(i.name))}${i.options && i.options.length ? `<small style="display:block;color:#78716c;">${esc(optionSummary(i.options))}</small>` : ''}</span><span>${vnd(i.price*i.qty)}</span></div>`).join('')}

      ${t.paymentMethod!=='transfer' && t.change>0 ? `<div class="ticket-change"><span>Trả lại khách</span><span>${vnd(t.change)}</span></div>` : '<div style="height:14px"></div>'}

}

function renderConfirmActionModal(){
  if (S.confirmRemoveLineId){
    const item = S.cart.find(c => cartLineId(c) === S.confirmRemoveLineId);
    return `
    <div class="modal-overlay">
      <div class="modal-bg" onclick="cancelRemoveFromCart()"></div>
      <div class="modal-card confirm-card">
        <h3>Xóa món khỏi giỏ?</h3>
        <div class="sub">${item ? esc(displayItemName(item.name)) : 'Món này'} sẽ được xóa khỏi giỏ hàng.</div>
        <div class="modal-actions">
          <button class="btn-secondary" type="button" onclick="cancelRemoveFromCart()">Hủy</button>
          <button class="btn-primary confirm-danger" type="button" onclick="confirmRemoveFromCart()">Đồng ý</button>

  if (S.confirmUndoOrderId){
    const order = S.orders.find(o => o.id === S.confirmUndoOrderId);
    return `
    <div class="modal-overlay">
      <div class="modal-bg" onclick="cancelUndoOrder()"></div>
      <div class="modal-card confirm-card">
        <h3>Hoàn tác đơn hàng?</h3>
        <div class="sub">Đơn ${order ? esc(formatOrderCode(order.orderNo)) : ''} sẽ quay về giỏ hàng để điều chỉnh.</div>
        <div class="modal-actions">
          <button class="btn-secondary" type="button" onclick="cancelUndoOrder()">Hủy</button>
          <button class="btn-primary confirm-danger" type="button" onclick="confirmUndoOrder()">Đồng ý</button>
        </div>
      </div>
    </div>`;
