  return '';
}

// ---------------------------------------------------------------------------
// DOM patching (morphdom) — updates only what actually changed instead of
// tearing down and rebuilding the whole #app on every click/keystroke.
// Because unaffected elements (scroll containers, inputs, the element the
// user is focused on, in-flight CSS animations...) are never removed from
// the document, the browser keeps their scroll position and focus
// automatically — no manual "snapshot & restore" hacks needed, and no more
// visible "jump to top" flicker on every interaction.
// ---------------------------------------------------------------------------
const MORPH_OPTS = {
  // Match repeated list items (cart rows, menu cards, category cards,
  // option rows, day groups, order rows...) by their stable id instead of
  // by position, so reordering/inserting/removing one doesn't disturb the
  // others, and so the *same* DOM node is reused (keeping its scroll/focus/
  // animation state) whenever the underlying record is unchanged.
  getNodeKey(node){
    if (!node || node.nodeType !== 1 || !node.getAttribute) return undefined;
    return node.getAttribute('data-key') ||
      node.getAttribute('data-cat-id') ||
      node.getAttribute('data-item-id') ||
      node.getAttribute('data-option-group-id') ||
      node.getAttribute('data-option-value-id') ||
      node.id || undefined;
  },
  onBeforeElUpdated(fromEl, toEl){
    // Never fight the user while they're actively typing/selecting in a
    // field: keep whatever is currently on screen for that one element,
    // everything else still updates normally.
    if (fromEl === document.activeElement && (fromEl.tagName === 'INPUT' || fromEl.tagName === 'TEXTAREA')){
      toEl.value = fromEl.value;
    }
    return true;
  },
};

function render(){
  applyTheme();
  let body = renderHeader();
  if (S.view === 'pos') body += renderPOS();
  else if (S.view === 'reports') body += renderReports();
  else body += renderSettings();
  body += renderCartDrawer() + renderItemOptionsModal() + renderCheckoutModal() + renderTicket() + renderToast() + renderCompletionOverlay() + renderReprintChoiceModal() + renderConfirmActionModal();
  morphdom(document.getElementById('app'), '<div id="app">' + body + '</div>', MORPH_OPTS);
  installEdgeBounce();
}

function installEdgeBounce(){
  const targets = document.querySelectorAll('.menu-scroll, .view-scroll, .cart-list, .order-scroll, .range-chips, .cat-bar');
  targets.forEach(el => {
    if (el._maiBounceBound) return;
    el._maiBounceBound = true;
    el.addEventListener('wheel', (event) => {
      const canScrollY = el.scrollHeight > el.clientHeight + 2;
      const canScrollX = el.scrollWidth > el.clientWidth + 2;
      const atTop = canScrollY && el.scrollTop <= 0 && event.deltaY < 0;
      const atBottom = canScrollY && el.scrollTop + el.clientHeight >= el.scrollHeight - 1 && event.deltaY > 0;
      const atLeft = canScrollX && el.scrollLeft <= 0 && event.deltaX < 0;
      const atRight = canScrollX && el.scrollLeft + el.clientWidth >= el.scrollWidth - 1 && event.deltaX > 0;
      if (!(atTop || atBottom || atLeft || atRight)) return;
      el.classList.remove('edge-bounce');
      void el.offsetWidth;
      el.classList.add('edge-bounce');
      window.setTimeout(() => el.classList.remove('edge-bounce'), 320);
    }, { passive:true });
  });
}

// ---------------------------------------------------------------------------
// Kiosk / full-screen mode — chạy app toàn màn hình, ẩn thanh địa chỉ.
// Trình duyệt chỉ cho phép bật Fullscreen API sau một tương tác của người
// dùng (không thể tự bật ngay khi tải trang vì lý do an toàn), nên ta:
// 1) tự động bật toàn màn hình ngay lần chạm/click đầu tiên trên trang,
// 2) vẫn có nút bấm ở header để bật/tắt thủ công bất cứ lúc nào,
// 3) khai báo "standalone" qua manifest ảo + thẻ meta để khi người dùng
//    "Thêm vào màn hình chính" (Add to Home Screen), app mở ra không còn
//    thanh địa chỉ/trình duyệt nữa — đây là cách duy nhất để ẩn hoàn toàn
//    thanh địa chỉ trên di động theo chính sách của các hãng trình duyệt.
// ---------------------------------------------------------------------------
function isFullscreenActive(){
  return !!(document.fullscreenElement || document.webkitFullscreenElement || document.msFullscreenElement);
}
function requestAppFullscreen(){
  const el = document.documentElement;
  const req = el.requestFullscreen || el.webkitRequestFullscreen || el.mozRequestFullScreen || el.msRequestFullscreen;
  if (!req) return;
  try {
    const result = req.call(el);
    if (result && result.catch) result.catch(()=>{});
  } catch(e){}
}
function exitAppFullscreen(){
  const exit = document.exitFullscreen || document.webkitExitFullscreen || document.mozCancelFullScreen || document.msExitFullscreen;
  if (!exit) return;
  try {
    const result = exit.call(document);
    if (result && result.catch) result.catch(()=>{});
  } catch(e){}
}
function toggleFullscreen(){
  if (isFullscreenActive()) exitAppFullscreen();
  else requestAppFullscreen();
}
(function setupKioskMode(){
  // Chỉ áp dụng "tự bật fullscreen ở lần chạm đầu" cho thiết bị cảm ứng
  // (điện thoại/tablet dùng làm kiosk bán hàng). Trên desktop (chuột),
  // người dùng đã có nút bật/tắt fullscreen thủ công ở header, nên không
  // tự động full màn hình khi chỉ bấm chuột — tránh gây bất ngờ khó chịu.
  const isTouchDevice = (window.matchMedia && window.matchMedia('(pointer: coarse)').matches)
    || navigator.maxTouchPoints > 0 || 'ontouchstart' in window;

  // Tự bật toàn màn hình ngay lần tương tác đầu tiên của người dùng.
  function onFirstInteraction(){
    requestAppFullscreen();
    window.removeEventListener('pointerdown', onFirstInteraction, true);
    window.removeEventListener('keydown', onFirstInteraction, true);
  }
  if (isTouchDevice){
    window.addEventListener('pointerdown', onFirstInteraction, true);
    window.addEventListener('keydown', onFirstInteraction, true);
  }

  // Mẹo cũ giúp thu nhỏ/ẩn thanh địa chỉ trên một số trình duyệt di động.
  window.addEventListener('load', function(){
    window.setTimeout(function(){ window.scrollTo(0, 1); window.scrollTo(0, 0); }, 80);
  });

  // Tạo manifest "standalone" ngay trong file (không cần file .json riêng)
  // để khi Thêm vào màn hình chính, app mở full màn hình, không thanh địa chỉ.
  try {
    const manifest = {
      name: 'Mai Coffee POS',
      short_name: 'Mai POS',
      start_url: location.href,
      display: 'standalone',
      orientation: 'any',
      background_color: '#2a160c',
      theme_color: '#2a160c',
    };
    const blob = new Blob([JSON.stringify(manifest)], { type: 'application/manifest+json' });
    const link = document.createElement('link');
    link.rel = 'manifest';
    link.href = URL.createObjectURL(blob);
    document.head.appendChild(link);
  } catch(e){}
})();

// ---------------------------------------------------------------------------
// Preload cả 2 logo (cam + matcha) trước khi render lần đầu — tránh lỗi logo
// không hiện/hiện sai trên một số trình duyệt mobile do ảnh base64 chưa kịp
// decode khi DOM vừa được tạo.
// ---------------------------------------------------------------------------
try {
  const preloadDefault = new Image();
  preloadDefault.decoding = 'sync';
  preloadDefault.src = LOGO_DEFAULT_SRC;
  const preloadMatcha = new Image();
  preloadMatcha.decoding = 'sync';
  preloadMatcha.src = LOGO_MATCHA_SRC;
} catch(e) {}

// ---------------------------------------------------------------------------
// Root render: see the morphdom-based render() function defined above,
// right next to MORPH_OPTS, for the actual implementation.
// ---------------------------------------------------------------------------
render();
</script>
